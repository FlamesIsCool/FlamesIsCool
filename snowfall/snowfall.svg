<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="200" preserveAspectRatio="none">
  <rect width="100%" height="100%" fill="transparent"/>
  <g>
    <circle cx="20" cy="10" r="1.5" fill="white">
      <animate attributeName="cy" from="0" to="200" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cx" from="10" to="90" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="40" r="1" fill="white">
      <animate attributeName="cy" from="0" to="200" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cx" from="20" to="100" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="20" r="2" fill="white">
      <animate attributeName="cy" from="0" to="200" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cx" from="0" to="100" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
